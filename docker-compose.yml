services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      CTF_SOLVER_DB: /data/ctf_solver.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  sandbox:
    image: python:3.12-slim
    profiles:
      - sandbox
    command: ["python", "-q"]
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  backend-data:

